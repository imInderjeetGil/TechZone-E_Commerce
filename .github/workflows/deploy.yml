name: Build, Push, and Deploy

on:
  push:
    tags:
      - "v*"

jobs:
  # ==========================================
  # JOB 1: Build and Push to Docker Hub
  # ==========================================
  build-and-push:
    name: Build and Push Image
    runs-on: ubuntu-latest
    steps:
      # Updated to v4 to fix the Node.js warning!
      - name: Checkout code
        uses: actions/checkout@v4

      # Updated to v3 to fix the Node.js warning!
      - name: Login to Docker-Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME}}
          password: ${{ secrets.DOCKER_PASSWORD}}

      - name: Extract version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Build Docker Image
        run: |
          docker build -t ${{secrets.DOCKER_USERNAME}}/techzone:${{ env.VERSION }} .
      
      - name: Push image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/techzone:${{ env.VERSION }}


    # ==========================================
  # JOB 2: Deploy to AWS EC2
  # ==========================================
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push  
    steps:
      - name: Extract version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/Techzone
            
            # 1. Update version in .env
            sed -i '/^VERSION=/d' .env
            echo "VERSION=${{ env.VERSION }}" >> .env
            
            # 2. Pull new image and restart containers
            docker pull ${{ secrets.DOCKER_USERNAME }}/techzone:${{ env.VERSION }}
            docker-compose down
            docker-compose up -d

            # 3. Restart Nginx to connect to the fresh containers
            sudo systemctl restart nginx
            
            # 4. CLEANUP: Remove old unused images, containers, and networks
            echo "Cleaning up old docker resources..."
            docker system prune -af

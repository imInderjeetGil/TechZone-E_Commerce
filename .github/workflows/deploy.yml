name: CI/CD to EC2 via Docker Hub

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/techzone-ecommerce:latest
            ${{ secrets.DOCKER_USERNAME }}/techzone-ecommerce:${{ github.sha }}

  deploy-to-ec2:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Add SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}
      
      - name: Add EC2 host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts
      
      - name: Deploy on EC2
        run: |
          ssh ubuntu@${{ secrets.EC2_HOST }} << 'EOF'
          set -e
          cd /home/ubuntu/techzone
          
          # Create/update .env file
          cat > .env << 'ENVFILE'
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          # ... rest of env vars
          ENVFILE
          
          # Stop + remove old containers
          docker-compose down --remove-orphans || true
          
          # Pull latest image
          docker pull ${{ secrets.DOCKER_USERNAME }}/techzone-ecommerce:latest
          
          # Start fresh
          docker-compose up -d
          
          # Health check
          sleep 5
          curl -f http://localhost/health || (docker-compose logs && exit 1)
          EOF

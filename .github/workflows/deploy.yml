name: Build and Push Docker Image

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      #1 Get the code
      - name: Checkout code
        uses: actions/checkout@v3

      #2 Login to Docker Hub
      - name: Login to Docker-Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME}}
          password: ${{ secrets.DOCKER_PASSWORD}}

      #3 Extract version
      - name: Extract version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      #4 Build Image and Push
      - name: Build Docker Image
        run: |
          docker build -t ${{secrets.DOCKER_USERNAME}}/techzone:${{ env.VERSION }} .
      
      - name: Push image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/techzone:${{ env.VERSION }}

      # Bhai yaha se EC2 pe deploy hota hai dekhle ise
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/Techzone
            sed -i '/^VERSION=/d' .env
            echo "VERSION=${{ env.VERSION }}" >> .env
            docker pull ${{ secrets.DOCKER_USERNAME }}/techzone:${{ env.VERSION }}
            docker-compose down
            docker-compose up -d

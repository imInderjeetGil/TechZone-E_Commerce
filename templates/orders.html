{% extends 'base.html' %}

{% block content %}

<div class="page-container">
    <div style="max-width:700px; margin:0 auto;">

        <div style="margin-bottom:2rem;">
            <h1 id="page-title" style="font-family:'Syne',sans-serif; font-size:2rem; font-weight:800; color:var(--navy);">Orders</h1>
            <p style="color:#64748b; font-size:0.9rem;">Track your order history</p>
        </div>

        <div id="orders-list"></div>

        <div id="empty-msg" style="display:none; text-align:center; padding:4rem;">
            <div style="font-size:4rem; margin-bottom:1rem;">📋</div>
            <h2 style="font-family:'Syne',sans-serif; font-size:1.3rem; font-weight:700; color:var(--navy); margin-bottom:0.5rem;">No orders yet</h2>
            <p style="color:#64748b; margin-bottom:1.5rem;">Your order history will appear here</p>
            <a href="/products-ui" style="background:var(--orange); color:white; padding:0.7rem 1.5rem; border-radius:8px; font-family:'Syne',sans-serif; font-weight:700; text-decoration:none;">
            Shop Now →
            </a>
        </div>

    </div>
</div>

<script src="/static/js/auth_guard.js"></script>
<script>requireAuth();</script>
<script src="/static/js/orders.js"></script>

{% endblock %}

{% extends 'base.html' %}

{% block content %}

<div class="page-container">

    <!-- Header -->
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:2rem;">
        <div>
            <h1 style="font-family:'Syne',sans-serif; font-size:2rem; font-weight:800; color:var(--navy);">All Products</h1>
            <p style="color:#64748b; font-size:0.9rem;">Browse our latest collection</p>
        </div>
        <div style="display:flex; gap:0.75rem;">
            <input id="search-input" onkeyup="searchProducts()" placeholder="Search products..." 
            style="border:2px solid #e2e8f0; padding:0.5rem 1rem; border-radius:8px; font-size:0.9rem; outline:none; width:220px;">
            <select id="sort-select" onchange="loadProducts()" 
            style="border:2px solid #e2e8f0; padding:0.5rem 1rem; border-radius:8px; font-size:0.9rem; outline:none; background:white;">
                <option value="">Sort by</option>
                <option value="price">Price: Low to High</option>
                <option value="-price">Price: High to Low</option>
                <option value="name">Name: A-Z</option>
                <option value="-name">Name: Z-A</option>
            </select>
        </div>
    </div>

    <!-- Products Grid -->
    <div id="product-list" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(260px, 1fr)); gap:1.5rem;"></div>

    <!-- Pagination -->
    <div style="display:flex; justify-content:center; align-items:center; gap:1rem; margin-top:2.5rem;">
        <button onclick="prevPage()" 
        style="background:white; border:2px solid #e2e8f0; padding:0.5rem 1.5rem; border-radius:8px; font-weight:700; cursor:pointer; font-family:'Syne',sans-serif;">
        ← Prev
        </button>
        <span id="page-info" style="color:#64748b; font-size:0.9rem; font-weight:600;">Page 1</span>
        <button onclick="nextPage()" 
        style="background:var(--navy); color:white; border:none; padding:0.5rem 1.5rem; border-radius:8px; font-weight:700; cursor:pointer; font-family:'Syne',sans-serif;">
        Next →
        </button>
    </div>

</div>

<script src="/static/js/auth_guard.js"></script>
<script src="/static/js/products.js"></script>

{% endblock %}

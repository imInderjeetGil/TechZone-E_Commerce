{% extends 'base.html' %}

{% block content %}

<div class="page-container">

    <div style="max-width:700px; margin:0 auto;">

        <div style="margin-bottom:2rem;">
            <h1 style="font-family:'Syne',sans-serif; font-size:2rem; font-weight:800; color:var(--navy);">Your Cart</h1>
            <p style="color:#64748b; font-size:0.9rem;">Review items before checkout</p>
        </div>

        <div id="cart-list"></div>

        <div id="cart-summary" class="card" style="padding:1.5rem; margin-top:1.5rem; display:none;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.25rem;">
                <span style="font-family:'Syne',sans-serif; font-size:1.1rem; font-weight:700; color:var(--navy);">Total Amount</span>
                <span style="font-family:'Syne',sans-serif; font-size:1.6rem; font-weight:800; color:var(--orange);">₹<span id="cart-total">0</span></span>
            </div>
            <button onclick="checkout()"
            style="width:100%; background:var(--navy); color:white; padding:0.9rem; border:none; border-radius:8px; font-family:'Syne',sans-serif; font-weight:700; font-size:1rem; cursor:pointer; transition: background 0.2s;"
            onmouseover="this.style.background='var(--blue)'" onmouseout="this.style.background='var(--navy)'">
            Proceed to Checkout →
            </button>
        </div>

        <div id="empty-msg" style="display:none; text-align:center; padding:4rem;">
            <div style="font-size:4rem; margin-bottom:1rem;">🛒</div>
            <h2 style="font-family:'Syne',sans-serif; font-size:1.3rem; font-weight:700; color:var(--navy); margin-bottom:0.5rem;">Your cart is empty</h2>
            <p style="color:#64748b; margin-bottom:1.5rem;">Add some products to get started</p>
            <a href="/products-ui" style="background:var(--orange); color:white; padding:0.7rem 1.5rem; border-radius:8px; font-family:'Syne',sans-serif; font-weight:700; text-decoration:none;">
            Browse Products →
            </a>
        </div>

    </div>
</div>

<script src="/static/js/auth_guard.js"></script>
<script>requireAuth();</script>
<script src="/static/js/cart.js"></script>

{% endblock %}

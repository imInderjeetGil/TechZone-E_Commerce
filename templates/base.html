<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <title>TechZone — Electronics Store</title>
    
    <style>
        * { font-family: 'DM Sans', sans-serif; }
        h1,h2,h3,nav a,button { font-family: 'Syne', sans-serif; }

        :root {
            --navy: #0a0f1e;
            --blue: #2563eb;
            --electric: #3b82f6;
            --orange: #f97316;
            --light: #f1f5f9;
        }

        body { background: var(--light); }

        .navbar {
            background: var(--navy);
            padding: 0 2rem;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 20px rgba(0,0,0,0.3);
        }

        .navbar-brand {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.4rem;
            color: white;
            letter-spacing: -0.5px;
        }

        .navbar-brand span { color: var(--orange); }

        .nav-links { display: flex; align-items: center; gap: 1.5rem; }

        .nav-link {
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 0.3px;
            transition: color 0.2s;
        }

        .nav-link:hover { color: white; }

        .btn-primary {
            background: var(--orange);
            color: white;
            padding: 0.4rem 1.1rem;
            border-radius: 6px;
            font-weight: 700;
            font-size: 0.85rem;
            border: none;
            cursor: pointer;
            transition: opacity 0.2s;
            text-decoration: none;
        }

        .btn-primary:hover { opacity: 0.85; }

        .btn-secondary {
            background: var(--blue);
            color: white;
            padding: 0.4rem 1.1rem;
            border-radius: 6px;
            font-weight: 700;
            font-size: 0.85rem;
            border: none;
            cursor: pointer;
            transition: opacity 0.2s;
            text-decoration: none;
        }

        .btn-secondary:hover { opacity: 0.85; }

        .cart-badge {
            background: var(--orange);
            color: white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 0.65rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-left: 4px;
            font-weight: 700;
        }

        .page-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
        }

        .badge-pending { background: #fef3c7; color: #d97706; padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; }
        .badge-paid { background: #dcfce7; color: #16a34a; padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; }
        .badge-cancelled { background: #fee2e2; color: #dc2626; padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; }
    </style>
</head>

<body>

<nav class="navbar">
    <div class="navbar-brand">Tech<span>Zone</span></div>
    <div class="nav-links">
        <a href="/" class="nav-link">Home</a>
        <a href="/products-ui" class="nav-link">Products</a>
        <span id="auth-section"></span>
    </div>
</nav>

<script>
function renderAuth(){
    const token = localStorage.getItem("token");
    const container = document.getElementById("auth-section");

    if(token){
        try {
            const base64 = token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
            const payload = JSON.parse(atob(base64));
            const isAdmin = payload.role === "admin";

            container.innerHTML = `
                <div style="display:flex;align-items:center;gap:1rem;">
                    ${isAdmin ? '<a href="/add-product-ui" class="nav-link">Add Product</a>' : ''}
                    ${!isAdmin ? '<a href="/cart-ui" class="nav-link">Cart <span class="cart-badge" id="cart-count">0</span></a>' : ''}
                    <a href="/orders-ui" class="nav-link">Orders</a>
                    <button onclick="logout()" class="btn-primary">Logout</button>
                </div>
            `;

            if(!isAdmin) loadCartCount();

        } catch(e) {
            localStorage.removeItem("token");
            showAuthButtons(container);
        }
    } else {
        showAuthButtons(container);
    }
}

function showAuthButtons(container){
    container.innerHTML = `
        <div style="display:flex;align-items:center;gap:0.75rem;">
            <a href="/login-ui" class="nav-link">Login</a>
            <a href="/register-ui" class="btn-secondary">Register</a>
        </div>
    `;
}

async function loadCartCount(){
    const token = localStorage.getItem("token");
    try {
        const res = await fetch("/cart/", {
            headers: { "Authorization": "Bearer " + token }
        });
        const data = await res.json();
        const badge = document.getElementById("cart-count");
        if(badge) badge.textContent = data.length;
    } catch(e) {}
}

function logout(){
    localStorage.removeItem("token");
    window.location="/";
}

renderAuth();
</script>

    {% block content %}{% endblock %}

</body>
</html>
